services:
  backend:
    build: ./backend
    container_name: studenthub-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - "JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set. Generate one with `openssl rand -hex 32`}"
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - DB_PATH=/data/studenthub.db
    volumes:
      - studenthub-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    container_name: studenthub-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  studenthub-data:
