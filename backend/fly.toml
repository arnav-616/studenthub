app = "studenthub-api-arnav616"
primary_region = "iad"

[build]

[env]
  PORT = "3001"
  NODE_ENV = "production"
  DB_PATH = "/data/studenthub.db"

# SQLite is a single file on local disk — never scale this app past 1 machine,
# or writes from different machines will corrupt the database.
[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"

[[mounts]]
  source = "studenthub_data"
  destination = "/data"
